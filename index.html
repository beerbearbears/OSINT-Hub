<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Romel Centralized OSINT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>🔎 OSINT</h2>
  <button id="toggle-dark">Toggle Theme</button>
  <button id="clear-all">Clear</button>
</div>

<div class="main">
  <h1>Romel Centralized OSINT</h1>

  <input id="input" placeholder="Enter IP / Domain / Email / Hash / CVE or paste Email Headers">
  <button id="search-btn">Search</button>

  <textarea id="output" placeholder="Results"></textarea>

  <!-- IP -->
  <div class="tool-section" data-type="ip">
    <h2>IP Intelligence</h2>
    <div class="tool-grid">
      <a id="vt_ip" target="_blank">VirusTotal</a>
      <a id="abuse" target="_blank">AbuseIPDB</a>
      <a id="shodan" target="_blank">Shodan</a>
      <a id="censys" target="_blank">Censys</a>
      <a id="greynoise" target="_blank">GreyNoise</a>
      <a id="viewdns" target="_blank">ViewDNS IP History</a>
    </div>
  </div>

  <!-- HASH -->
  <div class="tool-section" data-type="hash">
    <h2>Hash Intelligence</h2>
    <div class="tool-grid">
      <a id="vt_hash" target="_blank">VirusTotal</a>
      <a id="anyrun" target="_blank">ANY.RUN</a>
      <a id="triage" target="_blank">Triage</a>
      <a id="joesandbox" target="_blank">JoeSandbox</a>
    </div>
  </div>

  <!-- EMAIL HEADER -->
  <div class="tool-section" data-type="header">
    <h2>Email Header Toolkit</h2>
    <div class="tool-grid">
      <a id="mha" target="_blank">Microsoft Header Analyzer</a>
      <a id="google_header" target="_blank">Google Header Analyzer</a>
      <a id="mxtool_header" target="_blank">MXToolbox Header</a>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
