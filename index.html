<!DOCTYPE html>
<html>
<head>
    <title>OSINT-Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>🔎 OSINT-Hub</h2>
    <button onclick="toggleDark()">🌙 Toggle</button>
    <button onclick="clearAll()">🗑 Clear</button>
</div>

<div class="main">

    <h1>OSINT-Hub</h1>

    <div class="tabs">
        <button onclick="setType('ip')">IP</button>
        <button onclick="setType('domain')">Domain</button>
        <button onclick="setType('email')">Email</button>
        <button onclick="setType('username')">Username</button>
    </div>

    <input type="text" id="input" placeholder="Enter indicator...">
    <button onclick="search()">Search</button>

    <div class="tools">
        <button onclick="defang()">Defang</button>
        <button onclick="refang()">Refang</button>
        <button onclick="extractIOCs()">Extract IOCs</button>
        <button onclick="copyOutput()">Copy</button>
    </div>

    <div id="loading" class="loading">Loading...</div>

    <textarea id="output" placeholder="Results / Extracted IOCs"></textarea>

    <div class="tool-section">
        <h2>🎣 Phishing Analysis</h2>
        <div class="tool-grid">
            <a id="phishtank" target="_blank">PhishTank</a>
            <a id="phishtool" target="_blank">PhishTool</a>
            <a id="dnstwister" target="_blank">DNSTwister</a>
            <a id="scamsearch" target="_blank">ScamSearch</a>
            <a id="checkphish" target="_blank">CheckPhish</a>
            <a id="openphish" target="_blank">OpenPhish</a>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
