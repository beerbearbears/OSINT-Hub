<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Romel Centralized OSINT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sidebar">
    <div class="brand">
      <div class="logo">🔎</div>
      <div>
        <h2>OSINT</h2>
        <p>Romel Centralized Toolkit</p>
      </div>
    </div>

    <div class="actions">
      <button id="toggle-dark" type="button">🌙 Toggle Theme</button>
      <button id="clear-all" type="button">🗑 Clear</button>
    </div>

    <!-- Hint removed -->
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h1>Romel Centralized OSINT</h1>
        <div class="sub">IP / Domain / Hash / CVE pivots + IOC Extractor</div>
      </div>
    </div>

    <div class="input-panel">
      <div class="input-row">
        <input
          id="input"
          type="text"
          placeholder="Enter IP / Domain / Email / Username / Hash / CVE or paste Email Headers / logs"
        />
        <button id="search-btn" type="button">Search</button>
      </div>

      <div class="tools">
        <button id="defang-btn" type="button">Defang</button>
        <button id="refang-btn" type="button">Refang</button>
        <button id="extract-btn" type="button">Extract IOCs</button>
        <button id="copy-btn" type="button">Copy</button>
      </div>

      <div id="status" class="status">
        <span>Status: ready (landing page)</span>
        <span class="badge">OSINT</span>
      </div>

      <textarea id="output" placeholder="Results / Extracted IOCs"></textarea>
    </div>

    <!-- (ALL YOUR TOOL SECTIONS BELOW STAY THE SAME) -->
    <!-- keep your existing tool sections exactly as you posted -->
    <!-- ... -->

  </div>

  <script src="script.js"></script>
</body>
</html>
