<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OSINT-Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <div class="sidebar">
    <h2>OSINT-Hub</h2>
    <button onclick="setTab('ip')">IP</button>
    <button onclick="setTab('domain')">Domain</button>
    <button onclick="setTab('email')">Email</button>
    <button onclick="setTab('username')">Username</button>
    <hr>
    <button onclick="toggleDark()">Toggle Theme</button>
  </div>

  <div class="main">
    <h1>OSINT-Hub</h1>

    <!-- Indicator Search -->
    <div class="search-box">
      <input type="text" id="iocInput" placeholder="Enter Indicator">
      <button onclick="generateLinks()">Analyze</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <div id="loader" class="loader hidden"></div>
    <div id="results"></div>

    <hr>

    <!-- Defang Section -->
    <h2>Defang / Refang Tool</h2>

    <div class="search-box">
      <input type="text" id="defangInput" placeholder="Enter URL or IP">
      <button onclick="defang()">Defang</button>
      <button onclick="refang()">Refang</button>
    </div>

    <div id="defangResult"></div>

    <hr>

    <!-- IOC Extractor -->
    <h2>Raw Log IOC Extractor</h2>

    <textarea id="logInput" placeholder="Paste raw logs here..." rows="6"></textarea>
    <br><br>
    <button onclick="extractIOCs()">Extract IOCs</button>

    <div id="extractedResults"></div>

  </div>

<script src="script.js"></script>
</body>
</html>
